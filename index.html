<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovagangRecords</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="index-body">

  <header class="index-header">
    <div class="index-hdr-inner">
      <nav class="index-nav">
        <ul>
          <li><a href="pages/releases.html">releases</a></li>
          <li><a href="pages/clothing.html">clothing</a></li>
          <li><a href="pages/physicals.html">physicals</a></li>
          <li><a href="pages/artists.html">artists</a></li>
          <li><a href="#">mailing list</a></li>
          <li><a href="pages/tos.html">terms of service</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="index-canvas" id="canvas">
    <img class="home-logo" src="assets/novagang-records2026.png" alt="NovagangRecords" />
    <div class="home-logo-spacer"></div>
  </div>

  <script>
    (function () {
      var logo = document.querySelector('.home-logo');

      // Pull logo out of flow and position it fixed
      var rect = logo.getBoundingClientRect();
      var x = rect.left;
      var y = rect.top;
      var w = rect.width;

      // Insert spacer so links don't jump when logo leaves the flow
      var spacer = document.createElement('div');
      spacer.style.width  = rect.width  + 'px';
      spacer.style.height = rect.height + 'px';
      spacer.style.marginBottom = '10px';
      logo.parentNode.insertBefore(spacer, logo);

      logo.style.position = 'fixed';
      logo.style.left = x + 'px';
      logo.style.top  = y + 'px';
      logo.style.width = w + 'px';
      logo.style.margin = '0';
      logo.style.zIndex = '999';
      logo.style.willChange = 'transform';

      var vx = 0, vy = 0;
      var isDragging = false;
      var lastX, lastY, lastT;
      var raf;

      // Physics constants — floaty feel
      var DAMPING  = 0.999;  // barely any slowdown — keeps drifting
      var GRAVITY  = 0;      // no gravity
      var BOUNCE   = 0.8;    // energy kept on wall bounce

      logo.addEventListener('mousedown', onDown);
      logo.addEventListener('touchstart', onDown, { passive: false });

      function onDown(e) {
        e.preventDefault();
        isDragging = true;
        cancelAnimationFrame(raf);
        vx = 0; vy = 0;
        var pt = pointer(e);
        lastX = pt.x; lastY = pt.y; lastT = Date.now();
        logo.classList.add('dragging');
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchend', onUp);
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        var pt = pointer(e);
        var now = Date.now();
        var dt  = Math.max(now - lastT, 1);
        // Track velocity (px per frame at 60fps)
        vx = (pt.x - lastX) / dt * 5;
        vy = (pt.y - lastY) / dt * 5;
        x += pt.x - lastX;
        y += pt.y - lastY;
        lastX = pt.x; lastY = pt.y; lastT = now;
        setPos();
      }

      function onUp() {
        isDragging = false;
        logo.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchend', onUp);
        physics();
      }

      function physics() {
        vy += GRAVITY;
        vx *= DAMPING;
        vy *= DAMPING;
        x  += vx;
        y  += vy;

        var lw = logo.offsetWidth;
        var lh = logo.offsetHeight;
        var maxX = window.innerWidth  - lw;
        var maxY = window.innerHeight - lh;

        if (x < 0)    { x = 0;    vx =  Math.abs(vx) * BOUNCE; }
        if (x > maxX) { x = maxX; vx = -Math.abs(vx) * BOUNCE; }
        if (y < 0)    { y = 0;    vy =  Math.abs(vy) * BOUNCE; }
        if (y > maxY) { y = maxY; vy = -Math.abs(vy) * BOUNCE; }

        setPos();

        raf = requestAnimationFrame(physics);
      }

      function setPos() {
        logo.style.left = x + 'px';
        logo.style.top  = y + 'px';
      }

      function pointer(e) {
        return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                         : { x: e.clientX,             y: e.clientY };
      }
    })();
  </script>
</body>
</html>
