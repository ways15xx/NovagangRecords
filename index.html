<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovagangRecords</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    #yt-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    #yt-bg iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100vh * 16 / 9);
      height: calc(100vw * 9 / 16);
      min-width: 100%;
      min-height: 100%;
      border: none;
    }
    #yt-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      cursor: pointer;
    }
    .dvd-logo {
      position: absolute;
      width: 180px;
      user-select: none;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="hdr-inner">
      <a href="index.html" class="site-logo">
        <img src="assets/imp.png" alt="NovagangRecords" />

          <li><a href="pages/releases.html">releases</a></li>

        <ul class="nav-list">
          <li><a href="pages/tos.html">terms of service</a></li>
          <li><a href="#">cart</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div id="canvas">
    <div id="yt-bg">
      <iframe src="https://www.youtube.com/embed/TgCsLTON398?autoplay=1&mute=1&loop=1&playlist=TgCsLTON398&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <a id="yt-overlay" href="https://www.youtube.com/watch?v=TgCsLTON398" target="_blank" aria-label="Watch on YouTube"></a>
  </div>

  <footer class="site-footer fixed">
  <span>© 2026 NG-X LLC</span>
  <span>© 2026 NovagangRecords</span>
</footer>

  <script>
    (function () {
      var canvas = document.getElementById('canvas');
      var COUNT  = 10;
      var SPEED  = 1.8;
      var logos  = [];

      // Wait for first image to load so we get real dimensions
      var probe = new Image();
      probe.src = 'assets/novagang-records2026.png';
      probe.onload = function () {
        init(probe.naturalWidth, probe.naturalHeight);
      };
      // Fallback if already cached
      if (probe.complete) init(probe.naturalWidth || 180, probe.naturalHeight || 180);

      function init(nw, nh) {
        var isMobile = window.innerWidth <= 720;
        var W = isMobile ? 92 : 180;
        var H = Math.round(nh * (W / nw));

        for (var i = 0; i < COUNT; i++) {
          var img = document.createElement('img');
          img.src = 'assets/novagang-records2026.png';
          img.className = 'dvd-logo';
          canvas.appendChild(img);

          var angle = (Math.PI * 2 / COUNT) * i + Math.random() * 0.5;
          logos.push({
            el: img,
            x:  Math.random() * (canvas.offsetWidth  - W),
            y:  Math.random() * (canvas.offsetHeight - H),
            vx: Math.cos(angle) * SPEED,
            vy: Math.sin(angle) * SPEED,
            w:  W,
            h:  H
          });

          img.style.width  = W + 'px';
          img.style.height = H + 'px';
        }

        requestAnimationFrame(tick);
      }

      function tick() {
        var cw = canvas.offsetWidth;
        var ch = canvas.offsetHeight;

        // Move + wall bounce
        for (var i = 0; i < logos.length; i++) {
          var l = logos[i];
          l.x += l.vx;
          l.y += l.vy;

          if (l.x <= 0)        { l.x = 0;        l.vx =  Math.abs(l.vx); }
          if (l.x >= cw - l.w) { l.x = cw - l.w; l.vx = -Math.abs(l.vx); }
          if (l.y <= 0)        { l.y = 0;        l.vy =  Math.abs(l.vy); }
          if (l.y >= ch - l.h) { l.y = ch - l.h; l.vy = -Math.abs(l.vy); }

          l.el.style.left = l.x + 'px';
          l.el.style.top  = l.y + 'px';
        }

        // Logo-to-logo collision (AABB)
        for (var i = 0; i < logos.length; i++) {
          for (var j = i + 1; j < logos.length; j++) {
            var a = logos[i], b = logos[j];

            if (a.x < b.x + b.w && a.x + a.w > b.x &&
                a.y < b.y + b.h && a.y + a.h > b.y) {

              // Swap velocities
              var tvx = a.vx; a.vx = b.vx; b.vx = tvx;
              var tvy = a.vy; a.vy = b.vy; b.vy = tvy;

              // Separate so they don't stick
              var ox = (a.x + a.w / 2) - (b.x + b.w / 2);
              var oy = (a.y + a.h / 2) - (b.y + b.h / 2);
              if (Math.abs(ox) > Math.abs(oy)) {
                if (ox > 0) { a.x = b.x + b.w + 1; }
                else        { b.x = a.x + a.w + 1; }
              } else {
                if (oy > 0) { a.y = b.y + b.h + 1; }
                else        { b.y = a.y + a.h + 1; }
              }
            }
          }
        }

        requestAnimationFrame(tick);
      }
    })();
  </script>
  <script src="js/script.js"></script>
</body>
</html>
