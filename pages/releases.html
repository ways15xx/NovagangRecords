<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>releases - NovagangRecords</title>
    <meta name="author" content="NovagangRecords" />
    <meta name="description" content="NovagangRecords releases" />
    <meta name="keywords" content="NovagangRecords, releases, NOVAGANG" />
    <link
      rel="stylesheet"
      href="../releases_files/minimal-dark-styles-3364344753cbc319396e9d17916dcc1a.css"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
    <style>
      :root {
        --ink: rgb(0, 0, 0);
        --border: rgba(0, 0, 0, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }

      body {
        background: #fff !important;
        color: var(--ink) !important;
        font-family: "Space Mono", "Courier New", monospace !important;
        font-size: 14px;
        line-height: 1.35;
      }

      body::after,
      body::before {
        display: none !important;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .page {
        min-height: 100vh;
      }

      .inner {
        max-width: 1480px;
        margin: 0 auto;
        padding: 0 32px;
      }

      .header {
        background: #fff;
        border-top: 1px solid rgba(0, 0, 0, 0.95);
      }

      .header .inner {
        display: flex;
        align-items: center;
        gap: 26px;
        min-height: 72px;
      }

      .logo-link {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
      }

      .logo-img {
        display: block;
        width: auto;
        height: 42px;
      }

      .nav {
        flex: 0 1 auto;
        min-width: 0;
      }

      .nav-right {
        margin-left: auto;
      }

      .nav-list {
        display: flex;
        align-items: center;
        gap: 22px;
        white-space: nowrap;
      }

      .nav-list a {
        display: inline-block;
        line-height: 1;
        color: var(--ink) !important;
        background: transparent !important;
        text-decoration: none !important;
      }

      .nav-list a:visited,
      .nav-list a:hover,
      .nav-list a:active,
      .nav-list a:focus {
        color: var(--ink) !important;
        background: transparent !important;
      }

      .nav-list a.active {
        position: relative;
      }

      .nav-list a.active::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        bottom: -4px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.95);
      }

      @keyframes headerIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes contentIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .header {
        animation: headerIn 0.4s ease forwards;
      }

      .content {
        padding: 120px 0 56px;
        animation: contentIn 0.5s ease 0.15s both;
      }

      .release-grid {
        display: grid !important;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 16px 14px;
        align-items: start;
        margin: 0;
        padding: 0;
      }

      .release-grid::before,
      .release-grid::after {
        content: none !important;
        display: none !important;
      }

      .release-card {
        display: block !important;
        float: none !important;
        clear: none !important;
        width: auto !important;
        margin: 0 !important;
        min-width: 0;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        background: transparent !important;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .release-card.in-view {
        opacity: 1;
        transform: translateY(0);
      }

      .release-card:hover,
      .release-card:active,
      .release-card:focus {
        background: transparent !important;
        color: var(--ink) !important;
      }

      .release-card:hover {
        transform: translateY(-3px) !important;
      }

      .release-card-image {
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #fff;
      }

      .release-card-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .release-card:hover .release-card-image img {
        transform: scale(1.05);
      }

      .release-card-meta {
        margin-top: 8px;
      }

      .release-card-meta p {
        margin: 0;
      }

      .release-card-title {
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
      }

      .release-card:hover .release-card-meta,
      .release-card:hover .release-card-meta p {
        opacity: 1 !important;
        color: var(--ink) !important;
      }

      .release-card-empty .release-card-image {
        border: 1px solid rgba(0, 0, 0, 0.16);
      }

      .release-card-empty .release-card-image::after {
        content: "cover";
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        color: rgba(0, 0, 0, 0.4);
        text-transform: lowercase;
      }

      .artists-dropdown {
        position: relative;
      }

      .artists-toggle {
        cursor: pointer;
        user-select: none;
      }

      .artists-menu {
        position: absolute;
        top: calc(100% + 14px);
        left: 0;
        background: #fff;
        border: 1px solid var(--border);
        min-width: 160px;
        z-index: 200;
        padding: 6px 0;
        list-style: none !important;
        margin: 0 !important;
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      .artists-menu.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .artists-menu li {
        display: block !important;
      }

      .artists-menu li a {
        display: block !important;
        padding: 7px 16px !important;
        white-space: nowrap;
        color: var(--ink) !important;
        background: transparent !important;
        transition: none !important;
        text-decoration: none !important;
        font-size: 14px;
      }

      .artists-menu li a:hover {
        background: rgba(0, 0, 0, 0.06) !important;
      }

      .artists-menu li a.selected {
        text-decoration: underline !important;
      }

      .release-card.filtered-out {
        display: none !important;
      }

      @media (max-width: 1200px) {
        .release-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 900px) {
        .inner {
          padding: 0 24px;
        }

        .header .inner {
          flex-wrap: wrap;
          gap: 14px;
          padding-top: 14px;
          padding-bottom: 14px;
        }

        .nav-right {
          margin-left: 0;
        }

        .nav-list {
          flex-wrap: wrap;
          gap: 14px;
        }

        .nav-list a.active::after {
          width: 100%;
          bottom: -4px;
        }

        .content {
          padding-top: 64px;
        }

        .release-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 22px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">

      <main class="content">

          <section class="release-grid" aria-label="Releases">
            <a href="../albums/exit-2b.html" class="release-card" data-artist="B0YG1RL">
              <div class="release-card-image">

                  class="no-resize"

            <!-- To add a new release, copy this block:
            <a href="#" class="release-card" data-artist="ARTIST">
              <div class="release-card-image">

    </div>
    <script src="../js/script.js"></script>
    <script>
      (function () {
        var toggle = document.querySelector('.artists-toggle');
        var menu = document.getElementById('artists-menu');
        var activeArtist = null;

        var artists = [
          'angelus', 'B0YG1RL', 'Exodus1900', 'gv1nn',
          'kasper gem', 'KAY NIVE$', 'kingfelix', 'prblm',
          'quinn', 'Trauma', 'Ways', 'Zephrxd', 'Zootzie'
        ];

        artists.forEach(function (name) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#';
          a.textContent = name;
          li.appendChild(a);
          menu.appendChild(li);
        });

        function reAnimate(visibleCards) {
          visibleCards.forEach(function (card) {
            card.style.setProperty('transition', 'none', 'important');
            card.classList.remove('in-view');
          });
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              visibleCards.forEach(function (card) {
                card.style.removeProperty('transition');
              });
              visibleCards.forEach(function (card, i) {
                setTimeout(function () {
                  card.classList.add('in-view');
                }, i * 80);
              });
            });
          });
        }

        function setFilter(artist) {
          if (artist === activeArtist) artist = null;
          activeArtist = artist;

          menu.querySelectorAll('a').forEach(function (a) {
            a.classList.toggle('selected', !!artist && a.textContent === artist);
          });

          var visibleCards = [];
          document.querySelectorAll('.release-card').forEach(function (card) {
            var ca = card.getAttribute('data-artist');
            if (!artist || ca === artist) {
              card.classList.remove('filtered-out');
              visibleCards.push(card);
            } else {
              card.classList.add('filtered-out');
            }
          });

          reAnimate(visibleCards);
          toggle.textContent = artist ? 'artists (' + artist + ') ▼' : 'artists ▼';
          menu.classList.remove('open');
        }

        toggle.addEventListener('click', function (e) {
          e.preventDefault();
          menu.classList.toggle('open');
        });

        menu.addEventListener('click', function (e) {
          e.preventDefault();
          var a = e.target.closest('a');
          if (!a) return;
          setFilter(a.textContent);
        });

        document.addEventListener('click', function (e) {
          if (!e.target.closest('.artists-dropdown')) {
            menu.classList.remove('open');
          }
        });
      })();

      (function () {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry, i) {
            if (entry.isIntersecting) {
              var el = entry.target;
              var delay = (Array.from(el.parentNode.children).indexOf(el) % 6) * 60;
              setTimeout(function () { el.classList.add('in-view'); }, delay);
              observer.unobserve(el);
            }
          });
        }, { threshold: 0.08 });
        document.querySelectorAll('.release-card').forEach(function (card) {
          observer.observe(card);
        });
      })();

      (function () {
        function fixTitles() {
          document.querySelectorAll('.release-card-title').forEach(function (el) {
            var full = el.getAttribute('data-full') || el.textContent.trim();
            el.setAttribute('data-full', full);
            el.textContent = full;
            if (el.scrollWidth <= el.clientWidth) return;
            var lo = 0, hi = full.length;
            while (hi - lo > 1) {
              var mid = (lo + hi) >> 1;
              el.textContent = full.slice(0, mid).trimEnd() + '...';
              if (el.scrollWidth <= el.clientWidth) lo = mid;
              else hi = mid;
            }
            el.textContent = full.slice(0, lo).trimEnd() + '...';
          });
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fixTitles);
        } else {
          fixTitles();
        }
        window.addEventListener('resize', fixTitles);
      })();
    </script>
  </body>
