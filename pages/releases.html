    <script>
(function(){
  var cards = document.querySelectorAll('.r-card');
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, {threshold: 0.05});
  cards.forEach(function(c){ io.observe(c); });
})();
    </script>
