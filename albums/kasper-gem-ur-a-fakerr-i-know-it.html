    <script>
      (function () {
        var btn = document.querySelector('.cover-expand-btn');
        var img = document.querySelector('.album-cover img');
        var lb = document.createElement('div');
        lb.className = 'cover-lightbox';
        lb.innerHTML = '<button class="cover-lightbox-close" aria-label="Close">&#x2715;</button><img src="' + img.src + '" alt="' + img.alt + '" />';
        document.body.appendChild(lb);
        btn.addEventListener('click', function () { lb.classList.add('open'); });
        lb.querySelector('.cover-lightbox-close').addEventListener('click', function () { lb.classList.remove('open'); });
        lb.addEventListener('click', function (e) { if (e.target === lb) lb.classList.remove('open'); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') lb.classList.remove('open'); });
      })();
    </script>
