<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXIT 2B — B0YG1RL</title>
    <meta name="author" content="NovagangRecords" />
    <meta name="description" content="EXIT 2B by B0YG1RL — NovagangRecords" />
    <link rel="stylesheet" href="../releases_files/minimal-dark-styles-3364344753cbc319396e9d17916dcc1a.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
    <style>
      :root {
        --ink: rgb(0, 0, 0);
        --border: rgba(0, 0, 0, 0.22);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }

      body {
        background: #fff !important;
        color: var(--ink) !important;
        font-family: "Space Mono", "Courier New", monospace !important;
        font-size: 14px;
        line-height: 1.5;
      }

      body::after, body::before { display: none !important; }

      a { color: inherit; text-decoration: none; }
      ul { list-style: none; margin: 0; padding: 0; }
      .page { min-height: 100vh; }

      .inner {
        max-width: 1480px;
        margin: 0 auto;
        padding: 0 32px;
      }

      /* ── header ── */
      .header {
        background: #fff;
        border-top: 1px solid rgba(0, 0, 0, 0.95);
      }

      .header .inner {
        display: flex;
        align-items: center;
        gap: 26px;
        min-height: 72px;
      }

      .logo-link { flex: 0 0 auto; display: inline-flex; align-items: center; }
      .logo-img { display: block; width: auto; height: 42px; }
      .nav { flex: 0 1 auto; min-width: 0; }
      .nav-right { margin-left: auto; }

      .nav-list {
        display: flex;
        align-items: center;
        gap: 22px;
        white-space: nowrap;
      }

      .nav-list a {
        display: inline-block;
        line-height: 1;
        color: var(--ink) !important;
        background: transparent !important;
        text-decoration: none !important;
      }

      .nav-list a:visited,
      .nav-list a:hover,
      .nav-list a:active,
      .nav-list a:focus {
        color: var(--ink) !important;
        background: transparent !important;
      }

      .nav-list a.active { position: relative; }
      .nav-list a.active::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        bottom: -4px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.95);
      }

      /* ── animations ── */
      @keyframes headerIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes contentIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .header { animation: headerIn 0.4s ease forwards; }
      .content {
        padding: 80px 0 80px;
        animation: contentIn 0.5s ease 0.15s both;
      }

      /* ── album hero ── */
      .album-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 64px;
        align-items: start;
        margin-bottom: 72px;
      }

      .album-cover {
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #f0f0f0;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .album-cover-placeholder {
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.3);
      }

      .album-cover img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* ── album info ── */
      .album-info { padding-top: 8px; }

      .album-title {
        font-size: 26px;
        font-weight: normal;
        font-family: "Space Mono", "Courier New", monospace;
        margin: 0 0 10px;
        line-height: 1.2;
        color: var(--ink);
      }

      .album-artist {
        font-size: 14px;
        margin: 0 0 6px;
        color: var(--ink);
      }

      .album-date {
        font-size: 13px;
        color: rgba(0, 0, 0, 0.6);
        margin: 0 0 24px;
      }

      .album-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 0 0 24px;
      }

      .stream-label {
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.5);
        margin: 0 0 10px;
      }

      .stream-tba {
        font-size: 13px;
        color: rgba(0, 0, 0, 0.4);
      }

      /* ── tracklist ── */
      .tracklist-section {
        border-top: 1px solid var(--border);
        padding-top: 32px;
      }

      .tracklist-heading {
        font-size: 12px;
        font-weight: normal;
        font-family: "Space Mono", "Courier New", monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(0, 0, 0, 0.5);
        margin: 0 0 16px;
      }

      .tracklist {
        width: 100%;
        border-collapse: collapse;
      }

      .tracklist tr {
        border-bottom: 1px solid var(--border);
      }

      .tracklist tr:first-child {
        border-top: 1px solid var(--border);
      }

      .tracklist td {
        padding: 12px 8px;
        color: var(--ink);
        vertical-align: middle;
      }

      .track-num {
        width: 36px;
        color: rgba(0, 0, 0, 0.4);
        font-size: 13px;
        text-align: right;
        padding-right: 16px !important;
      }

      .track-name {
        width: 100%;
        font-size: 14px;
        color: rgba(0, 0, 0, 0.4);
      }

      .track-duration {
        white-space: nowrap;
        font-size: 12px;
        color: rgba(0, 0, 0, 0.3);
        text-align: right;
        padding-left: 24px !important;
      }

      /* ── responsive ── */
      @media (max-width: 900px) {
        .inner { padding: 0 24px; }
        .header .inner {
          flex-wrap: wrap;
          gap: 14px;
          padding-top: 14px;
          padding-bottom: 14px;
        }
        .nav-right { margin-left: 0; }
        .nav-list { flex-wrap: wrap; gap: 14px; }
        .content { padding-top: 48px; }
        .album-hero { grid-template-columns: 1fr; gap: 32px; }
        .album-title { font-size: 20px; }
      }
    </style>
  </head>
  <body>

            </table>

        </div>

    </div>

  </body>
</html>
